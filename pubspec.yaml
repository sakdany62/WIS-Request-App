name: permission_system
description: Staff Permission Request Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  
  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0
  
  # State Management
  provider: ^6.1.2
  
  # Utilities
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  http: ^1.3.0
  
  # ===== បន្ថែម packages ថ្មី =====
  # Excel Export
  excel: ^2.0.0
  
  # File Storage
  path_provider: ^2.1.5
  
  # Open File
  open_file: ^3.2.1
  
  # Permission (សម្រាប់ open_file)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/img/