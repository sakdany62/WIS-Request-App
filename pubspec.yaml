name: permission_system
description: Staff Permission Request Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  
  # Utilities
  cross_file: ^0.3.3+8
  image_picker: ^1.1.0
  
  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0
  
  # State Management
  provider: ^6.1.2
  
  # Storage & Preferences
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  http: ^1.3.0
  path_provider: ^2.1.5
  
  # Excel Export
  excel: ^2.0.0
  
  # Open File
  open_file: ^3.2.1
  
  # Permission
  permission_handler: ^11.3.1
  
  # ===== NOTIFICATION PACKAGES =====
  flutter_local_notifications: ^17.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/img/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#173B69"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#173B69"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 10
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"